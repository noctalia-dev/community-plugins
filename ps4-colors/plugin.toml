id = "Hy4ri/ps4-colors"
name = "PS4 Colors"
version = "0.1.0"
plugin_api = 3
author = "Hy4ri"
license = "MIT"
icon = "controller"
description = "Set the DualShock 4 lightbar colour from a bar button and panel."
tags = ["gaming", "hardware", "utility", "bar", "panel"]
dependencies = ["ps4-colors"]

[[widget]]
id = "widget"
entry = "widget.luau"

  [[widget.setting]]
  key = "glyph"
  type = "glyph"
  label_key = "settings.glyph.label"
  description_key = "settings.glyph.description"
  default = "controller"

[[panel]]
id = "panel"
entry = "panel.luau"
width = 420
height = 520
placement = "floating"
position = "center"

[[service]]
id = "service"
entry = "service.luau"
