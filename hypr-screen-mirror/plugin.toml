id = "profidev/hypr-screen-mirror"
name = "Hypr-Screen-Mirror"
version = "0.1.0"
plugin_api = 5
author = "profidev"
license = "MIT"
dependencies = ["hyprctl"]
tags = ["utility", "hyprland"]
icon = "screen-share"
description = "A plugin to quickly enable and disable screen mirroring in Hyprland."

[[widget]]
id = "widget"
entry = "widget.luau"

  [[widget.setting]]
  key = "toggle_mirror"
  type = "bool"
  label_key = "widget.toggle_mirror.label"
  default = false

  [[widget.setting]]
  key = "source"
  type = "select"
  label_key = "widget.source.label"

  [[widget.setting]]
  key = "target"
  type = "select"
  label_key = "widget.target.label"
