id = "thatonecalculator/um5606_fan_state"
name = "ASUS UM5606 Fan State"
version = "1.0.6"
min_noctalia = "5.0.0"
author = "ThatOneCalculator"
license = "MIT"
tags = ["hardware"]
icon = "car-fan"
description = "Set the fan state on the ZenBook S 16 UM5606."
dependencies = ["fan_state"]

[[setting]]
key = "show_label"
type = "bool"
label_key = "show_label"
default = false

[[setting]]
key = "poll_interval"
type = "int"
label_key = "poll_interval"
default = 2000
min = 250
max = 60000
advanced = true

[[service]]
id = "service"
entry = "fan_state_service.luau"

[[widget]]
id = "fan_state"
entry = "fan_state_bar.luau"

[[shortcut]]
id = "toggle"
entry = "shortcut.luau"
